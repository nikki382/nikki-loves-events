<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Soft outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#f2a7bc" stroke-width="1.5"/>
  <!-- Blush fill -->
  <circle cx="100" cy="100" r="93" fill="#fce4ec"/>
  <!-- Accent dots at compass points -->
  <circle cx="100" cy="8"   r="4.5" fill="#f2a7bc"/>
  <circle cx="100" cy="192" r="4.5" fill="#f2a7bc"/>
  <circle cx="8"   cy="100" r="4.5" fill="#e8d5f0"/>
  <circle cx="192" cy="100" r="4.5" fill="#e8d5f0"/>
  <!-- Diagonal accent dots -->
  <circle cx="34"  cy="34"  r="3" fill="#f2a7bc" opacity="0.6"/>
  <circle cx="166" cy="34"  r="3" fill="#f2a7bc" opacity="0.6"/>
  <circle cx="34"  cy="166" r="3" fill="#f2a7bc" opacity="0.6"/>
  <circle cx="166" cy="166" r="3" fill="#f2a7bc" opacity="0.6"/>
  <!-- NLE monogram — Georgia is a safe serif available everywhere -->
  <text x="100" y="118"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="58"
    font-weight="normal"
    font-style="italic"
    fill="#e07a9a"
    letter-spacing="3">NLE</text>
  <!-- Thin rule -->
  <line x1="50" y1="132" x2="150" y2="132" stroke="#f2a7bc" stroke-width="0.75"/>
  <!-- Subtitle in system sans -->
  <text x="100" y="148"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="8.5"
    font-weight="300"
    fill="#b07888"
    letter-spacing="2.8">NIKKI LOVES EVENTS</text>
</svg>
